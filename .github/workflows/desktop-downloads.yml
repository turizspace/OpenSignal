name: Build Desktop Downloads

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build Linux (.deb)
        run: ./gradlew :desktopApp:packageReleaseDeb

      - name: Prepare download asset
        run: |
          python - <<'PY' > /tmp/app_meta.txt
          import re
          from pathlib import Path

          text = Path("gradle.properties").read_text()

          def get(key: str) -> str:
            match = re.search(rf"^{key}=(.+)$", text, re.MULTILINE)
            return match.group(1).strip() if match else ""

          name = get("APP_NAME") or "OpenSignal"
          version = get("APP_VERSION_NAME") or "1.0.0"
          slug = re.sub(r"\s+", "", name)
          print(slug)
          print(version)
          PY
          APP_SLUG=$(sed -n '1p' /tmp/app_meta.txt)
          APP_VERSION=$(sed -n '2p' /tmp/app_meta.txt)
          mkdir -p opensignal-website/public/downloads
          DEB_FILE=$(ls desktopApp/build/compose/binaries/main-release/deb/*.deb | head -n 1)
          cp "$DEB_FILE" "opensignal-website/public/downloads/${APP_SLUG}-Desktop-v${APP_VERSION}-amd64.deb"

      - name: Upload download artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-downloads-linux
          path: opensignal-website/public/downloads/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Build Windows (.msi)
        run: .\gradlew.bat :desktopApp:packageReleaseMsi

      - name: Prepare download asset
        shell: pwsh
        run: |
          $script = @'
          import re
          from pathlib import Path
          text = Path("gradle.properties").read_text()
          m = re.search(r"^APP_NAME=(.+)$", text, re.MULTILINE)
          name = m.group(1).strip() if m else "OpenSignal"
          m = re.search(r"^APP_VERSION_NAME=(.+)$", text, re.MULTILINE)
          version = m.group(1).strip() if m else "1.0.0"
          slug = re.sub(r"\s+", "", name)
          print(slug)
          print(version)
          '@
          $meta = python -c $script
          $lines = $meta -split "`n" | Where-Object { $_ -ne "" }
          $appSlug = $lines[0]
          $appVersion = $lines[1]
          $downloadsPath = "opensignal-website\\public\\downloads"
          New-Item -ItemType Directory -Force -Path $downloadsPath | Out-Null
          $msi = Get-ChildItem -Path "desktopApp\\build\\compose\\binaries\\main-release\\msi" -Filter *.msi | Select-Object -First 1
          if (-not $msi) { throw "MSI not found in expected output directory." }
          Copy-Item $msi.FullName (Join-Path $downloadsPath "$appSlug-Desktop-v$appVersion-win64.msi") -Force

      - name: Upload download artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-downloads-windows
          path: opensignal-website/public/downloads/*.msi

  bundle-downloads:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/desktop-downloads
          merge-multiple: true

      - name: Upload combined downloads artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-downloads-all
          path: /tmp/desktop-downloads/*
